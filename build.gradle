plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

version = '0.6.0'

repositories {
    mavenCentral()
}

javafx {
    version = "25"
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics']
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
    implementation 'org.slf4j:slf4j-api:2.0.13'
    runtimeOnly 'ch.qos.logback:logback-classic:1.5.6'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.2'
}

application {
    mainClass = 'edu.facultysync.App'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

test {
    useJUnitPlatform()
    jvmArgs += [
        '--add-exports', 'javafx.graphics/com.sun.javafx.application=ALL-UNNAMED',
        '--add-opens', 'javafx.graphics/com.sun.glass.ui=ALL-UNNAMED'
    ]
    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = true
    }
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
    test {
        java {
            srcDirs = ['src/test/java']
        }
        resources {
            srcDirs = ['src/test/resources']
        }
    }
}

// Seed database and run conflict analysis + auto-resolve
tasks.register('seedAndResolve', JavaExec) {
    group = 'application'
    description = 'Seed the database with demo data and auto-resolve conflicts'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'edu.facultysync.SeedAndResolve'
}

// Build standalone distribution zip
tasks.register('distZip2', Zip) {
    group = 'distribution'
    description = 'Create a standalone distribution zip for Windows'
    archiveFileName = "FacultySync-${project.version}-windows.zip"
    destinationDirectory = layout.buildDirectory.dir('distributions')
    from(tasks.named('installDist').map { it.destinationDir })
}
