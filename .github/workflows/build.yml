name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver  Tag: $tag"

      - name: Build with Gradle
        shell: pwsh
        run: ./gradlew clean build distZip2 -x test --no-daemon

      - name: Run tests
        shell: pwsh
        run: ./gradlew test --no-daemon

      - name: Build MSI with jpackage
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $installDir = "build/install/facultysync"

          # Ensure installDist output exists
          ./gradlew installDist --no-daemon

          # Convert app-icon.png to .ico using PowerShell + .NET
          Add-Type -AssemblyName System.Drawing
          $pngPath = "app-icon.png"
          $icoPath = "build/app-icon.ico"
          if (Test-Path $pngPath) {
            $bitmap = [System.Drawing.Bitmap]::FromFile((Resolve-Path $pngPath))
            $resized = New-Object System.Drawing.Bitmap($bitmap, 256, 256)
            $icon = [System.Drawing.Icon]::FromHandle($resized.GetHicon())
            $stream = [System.IO.File]::Create($icoPath)
            $icon.Save($stream)
            $stream.Close()
            $icon.Dispose()
            $resized.Dispose()
            $bitmap.Dispose()
            Write-Host "Converted app-icon.png to .ico"
          }

          # Determine icon argument
          $iconArg = @()
          if (Test-Path $icoPath) {
            $iconArg = @("--icon", $icoPath)
          }

          # jpackage to build MSI (WiX is pre-installed on windows-latest)
          & jpackage `
            --type msi `
            --name FacultySync `
            --app-version $ver `
            --vendor "Abdul Ahad" `
            --description "University scheduling conflict detection and management" `
            @iconArg `
            --input "$installDir/lib" `
            --main-jar facultysync-$ver.jar `
            --main-class edu.facultysync.App `
            --dest build/installer `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --module-path "$installDir/lib" `
            --java-options "--enable-native-access=ALL-UNNAMED" `
            2>&1 | ForEach-Object { Write-Host $_ }

          # Fallback: if icon conversion failed, retry without it
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Retrying jpackage without icon..."
            jpackage `
              --type msi `
              --name FacultySync `
              --app-version $ver `
              --vendor "Abdul Ahad" `
              --description "University scheduling conflict detection and management" `
              --input "$installDir/lib" `
              --main-jar facultysync-$ver.jar `
              --main-class edu.facultysync.App `
              --dest build/installer `
              --win-dir-chooser `
              --win-menu `
              --win-shortcut `
              --module-path "$installDir/lib" `
              --java-options "--enable-native-access=ALL-UNNAMED"
          }

      - name: Upload distribution zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            build/distributions/FacultySync-${{ steps.version.outputs.VERSION }}-windows.zip
            build/installer/*.msi
          body: |
            ## FacultySync ${{ github.ref_name }}

            ### Artifacts
            - **FacultySync-${{ steps.version.outputs.VERSION }}-windows.zip** – Portable distribution (extract and run)
            - **FacultySync-${{ steps.version.outputs.VERSION }}.msi** – Windows installer (MSI via jpackage + WiX)

            ### What's included
            - Custom title bar with minimize, maximize, close and edge-resize
            - Native Windows notifications
            - Auto-update checker
            - 5-tab dashboard: Home, Schedule, Conflicts, Calendar, Analytics
            - IntervalTree-based conflict detection
            - Backtracking auto-resolve
            - Google Calendar-style weekly view
            - CSV import/export
            - Built-in demo seed data
